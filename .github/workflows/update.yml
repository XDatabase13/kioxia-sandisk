name: Update Kioxia/SanDisk PER Data

on:
  workflow_dispatch:

concurrency:
  group: update-kioxia-sandisk-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run build_data.py
        run: python build_data.py

      - name: Commit and push if data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            git commit -m "auto: update kioxia-sandisk data ${TIMESTAMP}"
            git pull --rebase origin master
            git push
            echo "data.json をコミット・プッシュしました。"
          fi
